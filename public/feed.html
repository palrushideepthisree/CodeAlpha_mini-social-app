<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Social - Feed</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">MiniSocial</div>
  <nav>
    <a href="feed.html">Feed</a>
    <a href="#" id="myProfileLink">Profile</a>
    <button class="secondary small" id="logoutBtn">Logout</button>
  </nav>
</div>

<div class="container">

  <div class="card">
    <form id="postForm">
      <textarea id="postText" placeholder="What's on your mind?" maxlength="500" required></textarea>
      <input type="url" id="postImage" placeholder="Image URL (optional)">
      <button type="submit">Post</button>
    </form>
  </div>

  <div id="feedList"></div>

</div>

<script src="js/api.js"></script>
<script src="js/feed.js"></script>
</body>
</html>
